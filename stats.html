<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ผลคะแนนโหวต - รักในกิโลเมตรที่ 2</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

  <style>
    body { 
      background-color: #f8f9fa; 
      font-family: 'Prompt', sans-serif; 
      color: #333;
    }
    h1, h2, h3, h4, h5, h6 {
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .text-primary { color: #0d6efd !important; }
    .card { 
      border-radius: 20px; 
      border: none;
      box-shadow: 0 8px 16px rgba(0,0,0,0.08); 
    }
    .header-logo { max-width: 120px; margin-bottom: 15px; border-radius: 10px; }
  </style>
</head>
<body>
  <div class="container mt-4 text-center">
    <img src="https://lh3.googleusercontent.com/d/1JzDurxvMYN9TzWh5L76omv4GKrox60QB" class="header-logo" alt="Logo">
    <h3 class="mb-2 text-primary">อัปเดตคะแนน Popular Vote ภาพอีสเตอร์</h3>
    <h2 class="mb-4">
      <span class="text-danger fw-bold" style="font-size: 1.2em;">"รักในกิโลเมตรที่ 2"</span>
    </h2>

    <div class="card p-4 mx-auto" style="max-width: 800px;">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0 text-muted">สรุปผลคะแนนโหวตแบบ Real-time</h5>
        <button class="btn btn-outline-primary btn-sm" onclick="loadStats()">🔄 อัปเดตข้อมูล</button>
      </div>
      
      <div style="position: relative; height: 50vh; width: 100%;">
        <canvas id="liveVoteChart"></canvas>
      </div>
      
      <div id="loadingText" class="text-center mt-3 text-primary" style="display: none;">
        <div class="spinner-border spinner-border-sm" role="status"></div> กำลังดึงข้อมูล...
      </div>
    </div>
  </div>

  <div class="text-center mt-4 mb-3">
    <a href="index.html" class="text-muted text-decoration-none" style="font-size: 0.8rem;">
      © พัฒนาโดย ฝ่ายศาสนกิจโรงพยาบาลกรุงเทพคริสเตียน
    </a>
  </div>

  <script>
    // === นำ Web App URL ของ GAS มาใส่ตรงนี้ ===
    const API_URL = "https://script.google.com/macros/s/AKfycbzdk5GjHQHlvqHSAqBNhKlUXdMnsZ1FmlCuhKV-3-R9es_5r6JhGYSZLcVZBBAJOd5y3A/exec"; 
    
    let chartInstance = null;

    // เปิดหน้าเว็บมาให้ดึงข้อมูลเลย
    window.onload = () => {
      // ลงทะเบียน Plugin สำหรับแสดงตัวเลขบนแท่งกราฟ
      Chart.register(ChartDataLabels);
      loadStats();
      
      // อัปเดตข้อมูลอัตโนมัติทุกๆ 30 วินาที (หากต้องการเปิดโชว์ทิ้งไว้บนจอ)
      setInterval(loadStats, 30000); 
    };

    async function callAPI(payload) {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      return response.json();
    }

    async function loadStats() {
      document.getElementById('loadingText').style.display = 'block';
      
      try {
        const res = await callAPI({ action: 'getStats' });
        document.getElementById('loadingText').style.display = 'none';
        
        if (res.status === 'success') {
          const stats = res.data;
          
          // เรียงลำดับเบอร์ (คีย์ของ Object) จากน้อยไปมาก
          const sortedKeys = Object.keys(stats).sort((a, b) => Number(a) - Number(b));
          
          const labels = sortedKeys.map(k => `เบอร์ ${k}`);
          const data = sortedKeys.map(k => stats[k]);

          if (chartInstance) {
            // ถ้ายกราฟมีอยู่แล้ว ให้อัปเดตแค่ข้อมูล (จะทำให้มีแอนิเมชันลื่นไหล)
            chartInstance.data.labels = labels;
            chartInstance.data.datasets[0].data = data;
            chartInstance.update();
          } else {
            // สร้างกราฟใหม่ครั้งแรก
            const ctx = document.getElementById('liveVoteChart').getContext('2d');
            chartInstance = new Chart(ctx, {
              type: 'bar',
              data: {
                labels: labels,
                datasets: [{ 
                  label: 'คะแนนโหวต', 
                  data: data, 
                  backgroundColor: 'rgba(220, 53, 69, 0.8)', // ใช้สีแดง (danger) ให้เข้ากับธีมงาน
                  borderColor: 'rgba(220, 53, 69, 1)',
                  borderWidth: 1,
                  borderRadius: 5 // แท่งกราฟโค้งมน
                }]
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { 
                  y: { 
                    beginAtZero: true, 
                    ticks: { stepSize: 1 } 
                  } 
                },
                plugins: {
                  legend: { display: false }, // ซ่อนกล่องอธิบายสี
                  datalabels: {
                    color: '#fff',
                    font: { weight: 'bold', size: 14 },
                    anchor: 'end',
                    align: 'bottom',
                    formatter: Math.round // แสดงตัวเลขเป็นจำนวนเต็ม
                  }
                }
              }
            });
          }
        }
      } catch (err) {
        document.getElementById('loadingText').style.display = 'none';
        console.error('ดึงข้อมูลล้มเหลว', err);
      }
    }
  </script>
</body>
</html>
