<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Popular Vote - รักในกิโลเมตรที่ 2</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <style>
    /* ปรับใช้ฟอนต์ Prompt กับทั้งเว็บไซต์ */
    body { 
      background-color: #f8f9fa; 
      font-family: 'Prompt', sans-serif; 
      color: #333;
    }
    
    /* ปรับแต่งหัวข้อให้ดูมีมิติและสวยงามขึ้น */
    h1, h2, h3, h4, h5, h6 {
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    
    .text-primary {
      color: #0d6efd !important;
    }

    .header-logo { 
      max-width: 150px; 
      margin-bottom: 20px; 
      border-radius: 10px; /* เพิ่มความมนให้โลโก้เล็กน้อย */
    }
    
    .card { 
      border-radius: 20px; /* เพิ่มความโค้งมนให้การ์ดดูทันสมัยขึ้น */
      border: none;
      box-shadow: 0 8px 16px rgba(0,0,0,0.08); /* ปรับเงาให้นุ่มนวลขึ้น */
      transition: transform 0.3s ease;
    }
    
    .btn {
      border-radius: 10px; /* ปุ่มโค้งมน */
      font-weight: 500;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="container mt-5 text-center">
    <img src="https://lh3.googleusercontent.com/d/1JzDurxvMYN9TzWh5L76omv4GKrox60QB" class="header-logo" alt="Logo">
    <h2 class="mb-4 text-primary">
  Popular Vote ภาพอีสเตอร์<br>
  <span class="text-danger fw-bold" style="font-size: 1.4em;">"รักในกิโลเมตรที่ 2"</span>
  </h2>

    <div id="mainSection" class="card p-4 mx-auto" style="max-width: 500px;">
      <h5 class="mb-3">ระบุตัวตนเพื่อเข้าสู่ระบบโหวต</h5>
      <select id="userType" class="form-select mb-3" onchange="toggleInput()">
        <option value="">-- เลือกประเภทผู้โหวต --</option>
        <option value="emp">พนักงาน</option>
        <option value="customer">ผู้รับบริการ</option>
      </select>

      <div id="regForm" style="display:none;">
        <input type="text" id="userName" class="form-control mb-3" placeholder="ชื่อ-นามสกุล">
        <input type="text" id="userId" class="form-control mb-3" placeholder="รหัสพนักงาน (0xxxxx) / เบอร์โทร (0xxxxxxxxx)">
        <button class="btn btn-success w-100" onclick="registerAndCheck()">เข้าสู่ระบบ</button>
      </div>
    </div>
  </div>

  <div class="modal fade" id="voteModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">ยืนยันการโหวต</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body text-center">
          <h3 class="text-danger">เบอร์ <span id="mNo"></span></h3>
          <img id="mImg" src="" class="img-fluid rounded mb-3" style="max-height: 300px;">
          <h5 id="mName"></h5>
          <p class="text-muted" id="mDept"></p>
        </div>
        <div class="modal-footer justify-content-center">
          <button type="button" class="btn btn-primary px-5" onclick="confirmVote()">ยืนยันการ Vote</button>
        </div>
      </div>
    </div>
  </div>

  <div class="text-center mt-5 mb-3">
    <a href="admin.html" class="text-muted text-decoration-none" style="font-size: 0.8rem;">
      © พัฒนาโดย ฝ่ายศาสนกิจโรงพยาบาลกรุงเทพคริสเตียน
    </a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // === นำ Web App URL ของ GAS มาใส่ตรงนี้ ===
    const API_URL = "https://script.google.com/macros/s/AKfycbzdk5GjHQHlvqHSAqBNhKlUXdMnsZ1FmlCuhKV-3-R9es_5r6JhGYSZLcVZBBAJOd5y3A/exec"; 
    const urlParams = new URLSearchParams(window.location.search);
    const targetNo = urlParams.get('no'); 
    let currentUser = JSON.parse(localStorage.getItem('bchVoterData'));

    window.onload = async () => {
      if (currentUser) {
        document.getElementById('mainSection').style.display = 'none';
        
        // เข้ามาแล้วเช็คเลยว่ามีชื่อในระบบหรือไม่ (ลดความหน่วงโดยรวมกับดึงข้อมูลไว้ด้วยกัน)
        const checkNo = targetNo ? targetNo : '0';
        await verifyAndLoad(checkNo);
      }
    };

    async function callAPI(payload) {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      return response.json();
    }

    function toggleInput() {
      const type = document.getElementById('userType').value;
      const idInput = document.getElementById('userId');
      document.getElementById('regForm').style.display = type ? 'block' : 'none';
      if (type === 'emp') idInput.placeholder = "รหัสพนักงาน 6 หลัก (0xxxxx)";
      if (type === 'customer') idInput.placeholder = "เบอร์โทร 10 หลัก (0xxxxxxxxx)";
    }

    async function registerAndCheck() {
      const type = document.getElementById('userType').value;
      const name = document.getElementById('userName').value;
      const id = document.getElementById('userId').value;

      if (!name || !id) return Swal.fire('แจ้งเตือน', 'กรุณากรอกข้อมูลให้ครบ', 'warning');
      if (type === 'emp' && !/^0\d{5}$/.test(id)) return Swal.fire('ผิดพลาด', 'รหัสพนักงานต้องขึ้นต้นด้วย 0 และมี 6 หลัก', 'error');
      if (type === 'customer' && !/^0\d{9}$/.test(id)) return Swal.fire('ผิดพลาด', 'เบอร์โทรต้องขึ้นต้นด้วย 0 และมี 10 หลัก', 'error');

      const userData = { type, name, id };
      Swal.fire({ title: 'กำลังลงทะเบียนเข้าสู่ระบบ...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() }});

      try {
        const res = await callAPI({ action: 'registerUser', userData: userData });
        if (res.status === 'success') {
          localStorage.setItem('bchVoterData', JSON.stringify(userData));
          currentUser = userData;

          if (targetNo) {
            await verifyAndLoad(targetNo); // โหลดข้อมูลโหวตต่อเลย
          } else {
            document.getElementById('mainSection').innerHTML = `<h5 class="text-success mt-4">ลงทะเบียนสำเร็จในชื่อ ${name}</h5><p class="text-muted">กรุณาสแกน QR Code ที่รูปภาพเพื่อทำการโหวต</p>`;
            Swal.fire('สำเร็จ', 'ลงทะเบียนเรียบร้อยแล้ว กรุณาสแกน QR Code ที่รูปภาพเพื่อทำการโหวต', 'success');
          }
        }
      } catch (err) {
        Swal.fire('ผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
      }
    }

    // ฟังก์ชันนี้ทำงานครั้งเดียว ดึงข้อมูลครบหมด
    async function verifyAndLoad(no) {
      Swal.fire({ title: 'กำลังตรวจสอบข้อมูล...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() }});
      
      try {
        const res = await callAPI({ action: 'getVotePageData', userId: currentUser.id, no: no });

        // 1. ตรวจพบว่าไม่มี User ในระบบ (ถูกลบ หรือข้อมูลผิด)
        if (res.status === 'user_not_found') {
          localStorage.removeItem('bchVoterData');
          currentUser = null;
          document.getElementById('mainSection').style.display = 'block'; // โชว์ฟอร์มลงทะเบียนอีกครั้ง
          return Swal.fire('เซสชันหมดอายุ', 'ไม่พบข้อมูลของคุณในระบบ หรือข้อมูลถูกลบไปแล้ว กรุณาลงทะเบียนใหม่', 'warning');
        }

        // 2. ตรวจพบว่าโหวตไปแล้ว
        if (res.status === 'voted') {
          document.getElementById('mainSection').innerHTML = `<h5 class="text-primary mt-4">ท่านได้ใช้สิทธิ์โหวตให้เบอร์ ${res.votedFor} ไปแล้ว</h5>`;
          document.getElementById('mainSection').style.display = 'block';
          return Swal.fire('คุณได้ใช้สิทธิ์แล้ว', `ท่านได้โหวตให้เบอร์ ${res.votedFor} ไปแล้ว`, 'info');
        }

        // 3. ผ่านเงื่อนไข โชว์ป๊อปอัพโหวต
        if (res.status === 'ready' && res.contestant) {
          Swal.close();
          document.getElementById('mNo').innerText = res.contestant.no;
          document.getElementById('mName').innerText = res.contestant.name;
          document.getElementById('mDept').innerText = res.contestant.dept;
          document.getElementById('mImg').src = res.contestant.image;
          new bootstrap.Modal(document.getElementById('voteModal')).show();
        } 
        else if (res.status === 'ready_no_target') {
          Swal.close();
          document.getElementById('mainSection').innerHTML = `<h5 class="text-success mt-4">คุณเข้าสู่ระบบในชื่อ ${currentUser.name}</h5><p class="text-muted">กรุณากดลิงก์ของผู้เข้าประกวดเพื่อทำการโหวต</p>`;
          document.getElementById('mainSection').style.display = 'block';
        }
        else {
          Swal.fire('ผิดพลาด', res.msg, 'error');
        }
      } catch (err) {
        Swal.fire('ผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
      }
    }

    async function confirmVote() {
      Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() }});
      currentUser.voteNo = targetNo;
      
      try {
        const res = await callAPI({ action: 'submitVote', userData: currentUser });
        if (res.status === 'success') {
          bootstrap.Modal.getInstance(document.getElementById('voteModal')).hide();
          document.getElementById('mainSection').innerHTML = `<h5 class="text-primary mt-4">ท่านได้ใช้สิทธิ์โหวตให้เบอร์ ${targetNo} ไปแล้ว</h5>`;
          document.getElementById('mainSection').style.display = 'block';
          Swal.fire('เรียบร้อย!', res.msg, 'success');
        } else {
          Swal.fire('ผิดพลาด', res.msg, 'error');
        }
      } catch (err) {
        Swal.fire('ผิดพลาด', 'เกิดข้อผิดพลาดในการบันทึก', 'error');
      }
    }
  </script>
</body>
</html>
